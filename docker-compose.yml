services:
  mongo:
    image: mongo:7
    container_name: robobooks-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand({ ping: 1 })\" || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: robobooks-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    working_dir: /app
    command: npm start
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/robobooks
      MONGODB_DB: robobooks
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      CLIENT_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 300
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: robobooks-client
    restart: unless-stopped
    depends_on:
      - backend
    working_dir: /app
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_BACKEND_URL: http://localhost:5000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - client_next:/app/.next

volumes:
  mongo_data:
  backend_node_modules:
  client_node_modules:
  client_next:
